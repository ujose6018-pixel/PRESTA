<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestaControl - Gestión de Préstamos</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#15803d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PrestaControl">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animaciones suaves para las transiciones de vistas */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Ocultar elementos */
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">

    <!-- Pantalla de Carga Inicial -->
    <div id="loading-screen" class="flex items-center justify-center min-h-screen bg-slate-50">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-green-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p id="loading-text" class="text-slate-600 font-medium">Conectando a la base de datos...</p>
        </div>
    </div>

    <!-- Aplicación Principal -->
    <div id="app-content" class="hidden">
        <!-- Navegación -->
        <nav class="bg-green-700 text-white shadow-md sticky top-0 z-10">
            <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center gap-2 cursor-pointer" onclick="window.showView('list')">
                    <!-- Icono Billetera -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
                    <h1 class="text-xl font-bold tracking-wide">PrestaControl</h1>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="window.showView('finance')" class="text-white/80 hover:text-white flex items-center gap-1 text-sm font-medium transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        Finanzas
                    </button>
                    <div class="flex items-center gap-3">
                    <button id="btn-install-pwa" class="hidden bg-white/20 hover:bg-white/30 text-white px-3 py-2 rounded-full text-xs font-bold transition-colors flex items-center gap-1 border border-white/30">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Instalar App
                    </button>
                    <button id="btn-new-loan" onclick="window.showView('add')" class="bg-green-500 hover:bg-green-400 text-white px-4 py-2 rounded-full font-medium flex items-center gap-2 transition-colors shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        <span class="hidden sm:inline">Nuevo Préstamo</span>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-4 py-8">
            <!-- VISTA: LISTA DE PRÉSTAMOS -->
            <div id="view-list" class="fade-in">
                <!-- Contenido inyectado por JS -->
            </div>

            <!-- VISTA: AGREGAR PRÉSTAMO -->
            <div id="view-add" class="hidden fade-in max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex items-center gap-3">
                    <button onclick="window.showView('list')" class="p-2 hover:bg-slate-200 rounded-full transition-colors text-slate-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                    </button>
                    <h2 class="text-lg font-bold text-slate-800">Registrar Nuevo Préstamo</h2>
                </div>
                <form id="form-add-loan" class="p-6 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4 md:col-span-2">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Nombre del Adeudante (Cliente) *</label>
                                <input type="text" id="clientName" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Ej. Juan Pérez">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Nombre del Intermediario (Opcional)</label>
                                <input type="text" id="intermediaryName" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Ej. María López">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Capital Inicial *</label>
                            <input type="number" id="initialCapital" required min="1" step="0.01" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="0.00">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Fecha de Entrega *</label>
                            <input type="date" id="startDate" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Frecuencia de Cobro *</label>
                            <select id="frequency" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none bg-white">
                                <option value="semanal">Semanal</option>
                                <option value="quincenal">Quincenal (Cada 15na)</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">% Interés (Rédito) *</label>
                            <input type="number" id="interestRate" required min="0" step="0.1" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Ej. 10">
                            <p class="text-xs text-slate-500 mt-1">Este es el porcentaje aplicado según la frecuencia elegida.</p>
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-slate-700 mb-1">% Comisión Intermediario</label>
                            <input type="number" id="commissionRate" min="0" step="0.1" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Ej. 20 (del rédito)">
                        </div>
                    </div>
                    <div class="pt-4 border-t border-slate-200 flex justify-end gap-3">
                        <button type="button" onclick="window.showView('list')" class="px-5 py-2 text-slate-600 hover:bg-slate-100 rounded-lg transition-colors font-medium">Cancelar</button>
                        <button type="submit" id="btn-save-loan" class="px-5 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg transition-colors font-medium flex items-center gap-2">Guardar Préstamo</button>
                    </div>
                </form>
            </div>

            <!-- VISTA: DETALLE DE PRÉSTAMO -->
            <div id="view-detail" class="hidden fade-in space-y-6">
                <!-- Contenido inyectado por JS -->
            </div>

            <!-- VISTA: FINANZAS (HISTORIAL DE RÉDITOS) -->
            <div id="view-finance" class="hidden fade-in space-y-6">
                <div class="flex items-center justify-between mb-4">
                    <button onclick="window.showView('list')" class="flex items-center gap-2 text-slate-500 hover:text-slate-800 transition-colors font-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Volver
                    </button>
                    <h2 class="text-2xl font-bold text-slate-800">Historial Financiero</h2>
                </div>

                <div id="finance-content">
                    <!-- Contenido inyectado por JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Lógica de la Aplicación -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, updateDoc, deleteDoc, query, where, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- CONFIGURACIÓN DE FIREBASE ---
        /*
        REGLAS DE FIRESTORE SIMPLIFICADAS (Copiar en consola Firebase):
        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            match /{document=**} {
              allow read, write: if request.time < timestamp.date(2035, 5, 9);
            }
          }
        }
        */
        const firebaseConfig = {
            apiKey: "AIzaSyAnLru6yhw9huXN25LV4kGmCfXL843o4TA",
            authDomain: "presta-57302.firebaseapp.com",
            projectId: "presta-57302",
            storageBucket: "presta-57302.firebasestorage.app",
            messagingSenderId: "636802344217",
            appId: "1:636802344217:web:46fa0418609d69eb841188"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Habilitar persistencia offline para mayor estabilidad
        enableIndexedDbPersistence(db).catch((err) => {
            if (err.code == 'failed-precondition') {
                console.warn("Persistencia falló: múltiples pestañas abiertas.");
            } else if (err.code == 'unimplemented') {
                console.warn("Persistencia no soportada por el navegador.");
            }
        });

        // --- CLAVE MAESTRA DE ELIMINACIÓN ---
        const DELETE_KEY = "2026";

        // --- ESTADO GLOBAL ---
        let currentUser = null;
        let globalLoans = [];
        let activeLoanId = null;
        let unsubscribeSnapshot = null;

        // Utilidades
        const formatCurrency = (amount) => new Intl.NumberFormat('es-HN', { style: 'currency', currency: 'HNL' }).format(amount || 0).replace('HNL', 'L');
        
        const getMonthShort = (dateStr) => {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleString('es-ES', { month: 'short' }).toUpperCase();
        };
        const getDay = (dateStr) => {
            const d = new Date(dateStr + 'T00:00:00');
            return d.getDate();
        };

        // --- INICIALIZACIÓN ---
        async function initApp() {
            try {
                // Intentar autenticación, pero no bloquear si falla (ya que se deshabilitó en consola)
                await signInAnonymously(auth).catch(e => console.warn("Auth Anónima deshabilitada o fallida, continuando en modo público."));
            } catch (error) {
                console.warn("Error inicial en Auth:", error);
            }

            // Escuchar cambios de autenticación o simplemente cargar datos si no hay auth
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) console.log("Sesión activa:", user.uid);
                else console.log("Modo público activo (sin usuario).");
                
                // Mostrar la app siempre, ya que el usuario quiere sincronización global sin filtros
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                
                document.getElementById('startDate').value = new Date().toISOString().split('T')[0];
                loadData();
            });

            // Fallback: Si en 3 segundos no hay respuesta de auth, forzar carga
            setTimeout(() => {
                if (document.getElementById('app-content').classList.contains('hidden')) {
                    console.log("Tiempo de espera de Auth agotado, forzando entrada...");
                    document.getElementById('loading-screen').classList.add('hidden');
                    document.getElementById('app-content').classList.remove('hidden');
                    loadData();
                }
            }, 3000);
        }

        // --- CARGA DE DATOS ---
        function loadData() {
            if (unsubscribeSnapshot) unsubscribeSnapshot();

            // ELIMINADO FILTRO DE USERID: 
            // Esto permite que todos los dispositivos que usen este mismo proyecto de Firebase
            // vean la misma lista de préstamos, ideal para sincronización personal.
            const loansRef = collection(db, 'loans');
            const q = query(loansRef); 
            
            unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                globalLoans = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                globalLoans.sort((a, b) => new Date(b.startDate) - new Date(a.startDate));
                
                // Actualizar la vista actual
                const detailView = document.getElementById('view-detail');
                const activeView = detailView && !detailView.classList.contains('hidden') ? 'detail' : 'list';
                
                if (activeView === 'list') {
                    renderList();
                } else if (activeView === 'detail' && activeLoanId) {
                    const updatedLoan = globalLoans.find(l => l.id === activeLoanId);
                    if (updatedLoan) renderDetail(updatedLoan);
                    else window.showView('list');
                }
            }, (error) => {
                console.error("Firestore Error (Carga de datos):", error);
                if (error.code === 'permission-denied') {
                    alert("Error: No tienes permisos para leer los datos. Asegúrate de que Firestore esté habilitado en la consola y las reglas sean correctas.");
                } else {
                    alert("Error al cargar datos: " + error.message);
                }
            });
        }

        // --- GESTIÓN DE VISTAS ---
        window.showView = (viewName, loanId = null) => {
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-add').classList.add('hidden');
            document.getElementById('view-detail').classList.add('hidden');
            document.getElementById('view-finance').classList.add('hidden');
            document.getElementById('btn-new-loan').classList.remove('hidden');

            if (viewName === 'list') {
                activeLoanId = null;
                renderList();
                document.getElementById('view-list').classList.remove('hidden');
            } else if (viewName === 'add') {
                document.getElementById('btn-new-loan').classList.add('hidden');
                document.getElementById('form-add-loan').reset();
                document.getElementById('startDate').value = new Date().toISOString().split('T')[0];
                document.getElementById('view-add').classList.remove('hidden');
            } else if (viewName === 'finance') {
                renderFinance();
                document.getElementById('view-finance').classList.remove('hidden');
            } else if (viewName === 'detail' && loanId) {
                activeLoanId = loanId;
                const loan = globalLoans.find(l => l.id === loanId);
                if (loan) {
                    renderDetail(loan);
                    document.getElementById('view-detail').classList.remove('hidden');
                }
            }
        };

        // --- RENDERIZADO DE LISTA ---
        function renderList() {
            const container = document.getElementById('view-list');
            
            if (globalLoans.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 bg-white rounded-xl shadow-sm border border-slate-200">
                        <svg class="mx-auto text-slate-300 mb-4" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
                        <h2 class="text-xl font-semibold text-slate-700 mb-2">No hay préstamos activos</h2>
                        <p class="text-slate-500 mb-6">Comienza registrando tu primer préstamo.</p>
                    </div>`;
                return;
            }

            // Dashboard Resumen
            const totalCapital = globalLoans.reduce((acc, loan) => acc + parseFloat(loan.currentCapital || 0), 0);
            const totalInterestExpected = globalLoans.reduce((acc, loan) => {
                const pendingQuotas = (loan.quotas || []).filter(q => q.status === 'pending');
                if (pendingQuotas.length > 0) {
                    const nextQuota = pendingQuotas[0];
                    const baseInterest = (parseFloat(loan.currentCapital || 0) * parseFloat(loan.interestRate || 0)) / 100;
                    return acc + (baseInterest * (nextQuota.interestMultiplier || 1));
                }
                return acc;
            }, 0);

            let html = `
            <!-- Dashboard Resumen -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                    <p class="text-slate-500 text-sm font-medium">Capital Total en Calle</p>
                    <p class="text-3xl font-bold text-slate-800">${formatCurrency(totalCapital)}</p>
                </div>
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                    <p class="text-slate-500 text-sm font-medium">Próximos Cobros Proyectados</p>
                    <p class="text-3xl font-bold text-green-600">${formatCurrency(totalInterestExpected)}</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
            globalLoans.forEach(loan => {
                const pendingQuotas = (loan.quotas || []).filter(q => q.status === 'pending');
                const nextQuota = pendingQuotas.length > 0 ? pendingQuotas[0] : null;
                const baseInterest = (parseFloat(loan.currentCapital) * parseFloat(loan.interestRate)) / 100;
                const nextInterest = nextQuota ? (baseInterest * (nextQuota.interestMultiplier || 1)) : baseInterest;
                
                html += `
                <div onclick="window.showView('detail', '${loan.id}')" class="bg-white rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow cursor-pointer border border-slate-200 hover:border-green-300">
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="font-bold text-lg text-slate-800 truncate pr-2">${loan.clientName}</h3>
                        <span class="bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded-md whitespace-nowrap">
                            ${loan.frequency === 'quincenal' ? '15nal' : 'Semanal'}
                        </span>
                    </div>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between">
                            <span class="text-slate-500">Capital Actual:</span>
                            <span class="font-semibold text-slate-800">${formatCurrency(loan.currentCapital)}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-slate-500">Próximo Cobro:</span>
                            <span class="font-medium text-blue-600">${formatCurrency(nextInterest)}</span>
                        </div>
                    </div>
                </div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        // --- RENDERIZADO DE FINANZAS ---
        function renderFinance() {
            const container = document.getElementById('finance-content');
            
            let totalPaidInterest = 0;
            let totalPendingInterest = 0;
            let totalPaidCommission = 0;
            let totalPendingCommission = 0;
            
            const clientHistory = {};

            globalLoans.forEach(loan => {
                const baseInterest = (parseFloat(loan.currentCapital) * parseFloat(loan.interestRate)) / 100;
                const commissionRate = parseFloat(loan.commissionRate || 0) / 100;

                loan.quotas.forEach(quota => {
                    const quotaInterest = baseInterest * (quota.interestMultiplier || 1);
                    const quotaCommission = quotaInterest * commissionRate;

                    if (quota.status === 'paid') {
                        totalPaidInterest += quotaInterest;
                        totalPaidCommission += quotaCommission;
                        
                        if (!clientHistory[loan.clientName]) clientHistory[loan.clientName] = 0;
                        clientHistory[loan.clientName] += quotaInterest;
                    } else {
                        totalPendingInterest += quotaInterest;
                        totalPendingCommission += quotaCommission;
                    }
                });
            });

            const totalNetPaid = totalPaidInterest - totalPaidCommission;
            const totalNetPending = totalPendingInterest - totalPendingCommission;

            let html = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-green-600 text-white p-6 rounded-2xl shadow-lg">
                        <p class="text-green-100 text-sm font-medium mb-1">Total Ganancia Neta (Pagada)</p>
                        <p class="text-3xl font-black">${formatCurrency(totalNetPaid)}</p>
                        <p class="text-xs text-green-200 mt-2">Ya descontadas las comisiones</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <p class="text-slate-500 text-sm font-medium mb-1">Total Comisiones Pagadas</p>
                        <p class="text-3xl font-bold text-orange-600">${formatCurrency(totalPaidCommission)}</p>
                        <p class="text-xs text-slate-400 mt-2">Dinero entregado a intermediarios</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <p class="text-slate-500 text-sm font-medium mb-1">Réditos Pendientes de Cobro</p>
                        <p class="text-3xl font-bold text-blue-600">${formatCurrency(totalNetPending)}</p>
                        <p class="text-xs text-slate-400 mt-2">Monto neto proyectado a recibir</p>
                    </div>
                </div>

                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="bg-slate-50 px-6 py-4 border-b border-slate-200">
                        <h3 class="font-bold text-slate-800">Top Clientes por Réditos Generados</h3>
                    </div>
                    <div class="p-6">
                        <div class="space-y-4">
                            ${Object.entries(clientHistory)
                                .sort((a, b) => b[1] - a[1])
                                .map(([name, amount]) => `
                                    <div class="flex justify-between items-center pb-3 border-b border-slate-100 last:border-0">
                                        <span class="font-medium text-slate-700">${name}</span>
                                        <span class="font-bold text-green-600">${formatCurrency(amount)}</span>
                                    </div>
                                `).join('') || '<p class="text-slate-400 text-center py-4 text-sm">No hay historial de pagos registrados aún.</p>'}
                        </div>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
        }

        // --- RENDERIZADO DEL DETALLE ---
        function renderDetail(loan) {
            const container = document.getElementById('view-detail');
            const currentCapital = parseFloat(loan.currentCapital);
            const baseInterest = (currentCapital * parseFloat(loan.interestRate)) / 100;
            
            // Buscar la próxima cuota pendiente para el detalle
            const pendingQuotas = (loan.quotas || []).filter(q => q.status === 'pending');
            const nextQuota = pendingQuotas.length > 0 ? pendingQuotas[0] : null;
            const nextInterest = nextQuota ? (baseInterest * (nextQuota.interestMultiplier || 1)) : baseInterest;
            const nextCommission = (nextInterest * parseFloat(loan.commissionRate || 0)) / 100;
            const nextNet = nextInterest - nextCommission;

            // Generar el HTML del Calendario
            let quotasHtml = '';
            if (loan.quotas && loan.quotas.length > 0) {
                loan.quotas.forEach(quota => {
                    const isPaid = quota.status === 'paid';
                    const quotaInterest = baseInterest * (quota.interestMultiplier || 1);
                    const bgClass = isPaid ? 'bg-green-50 border-green-400' : 'bg-red-50 border-red-200';
                    const textMonthClass = isPaid ? 'text-green-600' : 'text-slate-500';
                    const textDayClass = isPaid ? 'text-green-700' : 'text-red-600';
                    const statusText = isPaid ? '✓ Pagado' : 'Pendiente';
                    const statusColor = isPaid ? 'text-green-600' : 'text-red-500';

                    quotasHtml += `
                    <div onclick="window.toggleQuota('${loan.id}', '${quota.id}', '${quota.status}')" 
                         class="cursor-pointer border-2 rounded-xl p-3 text-center transition-all hover:scale-105 ${bgClass} shadow-sm">
                        <div class="text-xs uppercase font-bold ${textMonthClass}">${getMonthShort(quota.date)}</div>
                        <div class="text-3xl font-black ${textDayClass} my-1">${getDay(quota.date)}</div>
                        <div class="text-xs font-bold ${statusColor} mb-1">${statusText}</div>
                        <div class="text-xs font-medium text-slate-700 bg-white/50 rounded py-1">${formatCurrency(quotaInterest)}</div>
                    </div>`;
                });
            } else {
                quotasHtml = `<p class="text-sm text-slate-500 col-span-full">No hay cuotas programadas.</p>`;
            }

            container.innerHTML = `
                <!-- Cabecera -->
                <button onclick="window.showView('list')" class="flex items-center gap-2 text-slate-500 hover:text-slate-800 transition-colors font-medium mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Volver
                </button>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col md:flex-row justify-between md:items-center gap-4">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-800">${loan.clientName}</h2>
                        <p class="text-sm text-slate-500 mt-1">Inicio: ${loan.startDate} • Intermediario: ${loan.intermediaryName || 'Ninguno'}</p>
                    </div>
                    <button onclick="window.promptCapitalAbono('${loan.id}', ${currentCapital})" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-medium shadow-sm transition-colors text-sm w-full md:w-auto">
                        Abonar al Capital
                    </button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Izquierda: Detalles Económicos -->
                    <div class="space-y-6">
                        <!-- Estado del Capital -->
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div class="bg-slate-50 px-5 py-3 border-b border-slate-200 font-semibold text-slate-700">Estado del Préstamo</div>
                            <div class="p-5 space-y-4">
                                <div class="flex justify-between items-center">
                                    <span class="text-sm text-slate-500">Capital Inicial</span>
                                    <span class="font-medium text-slate-700">${formatCurrency(loan.initialCapital)}</span>
                                </div>
                                <div class="flex justify-between items-center pb-4 border-b border-slate-100">
                                    <span class="text-sm text-slate-500 font-bold">Capital Actual Deuda</span>
                                    <span class="text-xl font-bold text-blue-700">${formatCurrency(currentCapital)}</span>
                                </div>
                                
                                <h3 class="text-sm font-bold text-slate-700 mt-4">Detalle de Próximo Cobro</h3>
                                <div class="flex justify-between text-sm">
                                    <span class="text-slate-500">Monto Bruto:</span>
                                    <span class="font-semibold text-slate-800">${formatCurrency(nextInterest)}</span>
                                </div>
                                ${loan.intermediaryName ? `
                                <div class="flex justify-between text-sm text-orange-600">
                                    <span>Comisión intermediario:</span>
                                    <span class="font-semibold">- ${formatCurrency(nextCommission)}</span>
                                </div>` : ''}
                                <div class="flex justify-between items-center bg-green-50 p-3 rounded-lg mt-2">
                                    <span class="font-bold text-green-800">Monto Neto a Recibir:</span>
                                    <span class="text-lg font-bold text-green-700">${formatCurrency(nextNet)}</span>
                                </div>
                            </div>
                        </div>

                        <button onclick="window.deleteLoanWithKey('${loan.id}')" class="w-full flex items-center justify-center gap-2 text-red-500 hover:text-red-700 hover:bg-red-50 py-3 rounded-xl border border-red-200 transition-colors text-sm font-bold shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                            Eliminar Préstamo (Requiere Clave)
                        </button>
                    </div>

                    <!-- Derecha: Calendario Visual -->
                    <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                        <div class="bg-slate-50 px-5 py-4 border-b border-slate-200 font-semibold text-slate-700 flex justify-between items-center">
                            <span>Calendario de Pagos (Cuotas)</span>
                            <span class="text-xs bg-slate-200 text-slate-600 px-2 py-1 rounded">Haz clic para marcar como Pagado</span>
                        </div>
                        <div class="p-5 flex-1 overflow-y-auto">
                            ${currentCapital === 0 ? `
                                <div class="bg-green-100 text-green-800 p-4 rounded-lg text-center font-bold">
                                    ¡La deuda de capital ha sido saldada completamente!
                                </div>
                            ` : `
                                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                                    ${quotasHtml}
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- ACCIONES DEL USUARIO ---

        // Generador de fechas para cuotas con lógica de fechas fijas y promediado
        function generateQuotas(startDate, frequency, numQuotas = 24) {
            const quotas = [];
            const start = new Date(startDate + 'T00:00:00');
            let currentDate = new Date(start);

            for(let i = 1; i <= numQuotas; i++) {
                let nextDate = new Date(currentDate);
                let isFirst = i === 1;

                if (frequency === 'quincenal') {
                    // Lógica 1 y 16 de cada mes
                    const day = nextDate.getDate();
                    if (day < 16 && day >= 1) {
                        // Si es antes del 16, la próxima es el 16 del mismo mes
                        nextDate.setDate(16);
                    } else {
                        // Si es 16 o más, la próxima es el 1 del mes siguiente
                        nextDate.setMonth(nextDate.getMonth() + 1);
                        nextDate.setDate(1);
                    }
                } else {
                    // Lógica Semanal: Próximo Domingo
                    const daysUntilSunday = (7 - nextDate.getDay()) % 7;
                    const addDays = (daysUntilSunday === 0 && !isFirst) ? 7 : daysUntilSunday;
                    // Si el día de entrega ya es domingo, el primer pago es el siguiente domingo
                    const actualAdd = (isFirst && nextDate.getDay() === 0) ? 7 : (addDays === 0 && isFirst ? 7 : addDays);
                    nextDate.setDate(nextDate.getDate() + (actualAdd || 7));
                }

                // Cálculo de Promedio (Pro-rate) para la primera cuota
                let interestMultiplier = 1;
                if (isFirst) {
                    const diffTime = Math.abs(nextDate - start);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    
                    if (frequency === 'quincenal') {
                        // Una quincena promedio tiene 15 días
                        interestMultiplier = diffDays / 15;
                    } else {
                        // Una semana tiene 7 días
                        interestMultiplier = diffDays / 7;
                    }
                    // No cobrar más de una cuota completa si el desfase es grande
                    if (interestMultiplier > 1) interestMultiplier = 1;
                }

                quotas.push({
                    id: 'q_' + Date.now() + '_' + i,
                    date: nextDate.toISOString().split('T')[0],
                    status: 'pending',
                    interestMultiplier: interestMultiplier
                });
                
                currentDate = new Date(nextDate);
            }
            return quotas;
        }

        // 1. Guardar Préstamo
        document.getElementById('form-add-loan').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save-loan');
            const originalText = btn.innerText;
            
            // Eliminada la validación de sesión obligatoria para permitir sincronización pública
            // si el usuario decidió deshabilitar la autenticación.

            btn.innerText = 'Guardando...';
            btn.disabled = true;

            try {
                const startDate = document.getElementById('startDate').value;
                const frequency = document.getElementById('frequency').value;
                const initialCapital = parseFloat(document.getElementById('initialCapital').value);
                const interestRate = parseFloat(document.getElementById('interestRate').value);
                const commissionRate = parseFloat(document.getElementById('commissionRate').value || 0);
                
                // Validaciones básicas de negocio
                if (isNaN(initialCapital) || initialCapital <= 0) throw new Error("El capital inicial debe ser un número positivo.");
                if (isNaN(interestRate) || interestRate < 0) throw new Error("El interés debe ser un número válido.");

                const newLoan = {
                    clientName: document.getElementById('clientName').value.trim(),
                    intermediaryName: document.getElementById('intermediaryName').value.trim(),
                    initialCapital: initialCapital,
                    currentCapital: initialCapital,
                    startDate: startDate,
                    frequency: frequency,
                    interestRate: interestRate,
                    commissionRate: commissionRate,
                    quotas: generateQuotas(startDate, frequency, 24), 
                    createdAt: new Date().toISOString(),
                    userId: currentUser ? currentUser.uid : 'public' // ID público si no hay auth
                };

                console.log("Intentando guardar préstamo en Firestore...", newLoan);
                
                // Usar colección 'loans' para mayor estabilidad
                const loansRef = collection(db, 'loans');
                
                // Timeout manual por si Firestore se queda "colgado" (pasa en redes lentas)
                const savePromise = addDoc(loansRef, newLoan);
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error("Tiempo de espera agotado. Revisa tu conexión o las reglas de Firebase.")), 10000)
                );

                const docRef = await Promise.race([savePromise, timeoutPromise]);
                
                console.log("¡Préstamo guardado exitosamente en la nube!", docRef.id);
                // Redirigir directamente al detalle del préstamo recién creado
                window.showView('detail', docRef.id);
                
            } catch (error) {
                console.error("ERROR CRÍTICO AL GUARDAR EN FIRESTORE:", error);
                console.log("Código de error:", error.code);
                console.log("Detalles del error:", error.message);
                
                let msg = "No se pudo guardar el préstamo en la base de datos.";
                
                if (error.message.includes("permission-denied") || error.code === 'permission-denied') {
                    msg = "ERROR DE PERMISOS: La base de datos rechazó el guardado. Asegúrate de haber publicado las reglas 'allow read, write: if true;' en la consola de Firebase.";
                } else if (error.message.includes("network") || error.code === 'unavailable') {
                    msg = "ERROR DE RED: No hay conexión con los servidores de Firebase. Los datos NO se han guardado.";
                } else {
                    msg = `Error técnico: ${error.message}. Por favor, revisa la consola del navegador para más detalles.`;
                }
                
                alert(msg);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        // 2. Alternar estado de la cuota (Pendiente / Pagado)
        window.toggleQuota = async (loanId, quotaId, currentStatus) => {
            const loan = globalLoans.find(l => l.id === loanId);
            if (!loan) return;

            const newStatus = currentStatus === 'pending' ? 'paid' : 'pending';
            const updatedQuotas = loan.quotas.map(q => q.id === quotaId ? { ...q, status: newStatus } : q);

            try {
                const loanRef = doc(db, 'loans', loanId);
                // Actualización optimista
                const quotaEl = event.currentTarget;
                quotaEl.style.opacity = '0.5'; 
                
                await updateDoc(loanRef, { quotas: updatedQuotas });
            } catch (error) {
                console.error("Error actualizando cuota:", error);
                alert("No se pudo actualizar el estado de la cuota.");
            }
        };

        // 3. Abono a Capital
        window.promptCapitalAbono = async (loanId, currentCapital) => {
            const amountStr = prompt(`El capital actual es L ${currentCapital}.\n¿Cuánto desea abonar al capital?`);
            if (!amountStr) return;
            
            const amount = parseFloat(amountStr);
            if (isNaN(amount) || amount <= 0) {
                alert("Monto inválido.");
                return;
            }
            if (amount > currentCapital) {
                alert("El abono no puede ser mayor a la deuda actual.");
                return;
            }

            try {
                const loanRef = doc(db, 'loans', loanId);
                await updateDoc(loanRef, {
                    currentCapital: currentCapital - amount
                });
            } catch (error) {
                console.error("Error al registrar abono:", error);
            }
        };

        // 4. Eliminar con Clave
        window.deleteLoanWithKey = async (loanId) => {
            const key = prompt("Ingrese la CLAVE DE SEGURIDAD para eliminar este préstamo:");
            
            if (key === null) return; // Usuario canceló el prompt

            if (key === DELETE_KEY) {
                if (confirm("¿Está TOTALMENTE seguro? Esta acción no se puede deshacer y borrará todo el historial de pagos.")) {
                    try {
                        const loanRef = doc(db, 'loans', loanId);
                        await deleteDoc(loanRef);
                        window.showView('list');
                    } catch (error) {
                        console.error("Error borrando:", error);
                        alert("Error al intentar eliminar de la base de datos.");
                    }
                }
            } else {
                alert("Clave incorrecta. No tiene permisos para eliminar préstamos.");
            }
        };

        // Iniciar la app
        initApp();

        // --- REGISTRO DE SERVICE WORKER PARA PWA ---
        let deferredPrompt;
        const installBtn = document.getElementById('btn-install-pwa');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('Service Worker registrado con éxito.', reg.scope))
                    .catch((err) => console.warn('Fallo al registrar el Service Worker.', err));
            });
        }

        // Manejo del evento de instalación
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevenir que el navegador lo muestre automáticamente
            e.preventDefault();
            // Guardar el evento para dispararlo luego
            deferredPrompt = e;
            // Mostrar nuestro botón personalizado
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                // Mostrar el prompt de instalación
                deferredPrompt.prompt();
                // Esperar la elección del usuario
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`Usuario eligió la instalación: ${outcome}`);
                // Limpiar la variable
                deferredPrompt = null;
                // Ocultar el botón
                installBtn.classList.add('hidden');
            }
        });

        window.addEventListener('appinstalled', (event) => {
            console.log('¡App instalada con éxito!');
            installBtn.classList.add('hidden');
        });
    </script>
</body>
